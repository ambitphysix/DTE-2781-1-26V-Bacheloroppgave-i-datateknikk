<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=8">
    <meta charset="UTF-8">
    <title>Leaflet eksempel</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet.css') }}" />

    <style type="text/css">
        html, body {
            height: 100%;
            margin: 0;
            background: #fff;
        }

        .map_fullscreen {
            width: 100%;
            height: 100%;
            background: #fff;
        }
    </style>

</head>
<body>


<div id="map" class="map_fullscreen"></div>

<script src="{{ url_for('static', filename='js/leaflet.js') }}"></script>


<script type="text/javascript">
    (function () {
        var map = L.map('map').setView([64.5, 10], 5);

        var topo = L.tileLayer.wms('https://wms.geonorge.no/skwms1/wms.topo', {
        layers: 'topo',
        format: 'image/png',
        attribution: '&copy; Kartverket'
        });

        topo.addTo(map);
    }());
</script>
</body>
</html>
