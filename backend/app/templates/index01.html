<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>
    
    <h1>Leaflet kart</h1>
    <h2>fra OpenStreetMap</h2>
    
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialiser kartet
        // [59.91, 10.75] er koordinatene for Oslo. 13 er zoom-nivået.
        var map = L.map('map').setView([59.91, 10.75], 13);

        // Legg til OpenStreetMap kartfliser
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Legg til en markør på kartet
        var marker = L.marker([59.91, 10.75]).addTo(map);
        marker.bindPopup("<b>Hei!</b><br>Dette er Oslo.").openPopup();
    </script>
    
</body>
</html>
