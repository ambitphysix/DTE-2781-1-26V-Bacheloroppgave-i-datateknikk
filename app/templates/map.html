{% extends "base.html" %}

{% block content %}
<div id="map"></div>
{% endblock %}

{% block scripts %}
    <script type="module" src="{{ url_for('static', filename='js/leaflet.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/display.js') }}"></script>
    <script type="module">
        import { displayMapObjects } from "{{ url_for('static', filename='js/display.js') }}";
        import { MissingPersonMenu } from "{{ url_for('static', filename='js/display.js') }}";
        (function () {
            var map = L.map('map').setView([64.5, 10], 5);

            L.tileLayer.wms(
                'https://wms.geonorge.no/skwms1/wms.topo', {
                    layers: 'topo',
                    format: 'image/png',
                    attribution: '&copy; Kartverket'
                }
            ).addTo(map);

            var ringLayer = L.layerGroup().addTo(map);
            var menu = new MissingPersonMenu()
            menu.addTo(map);
            map.on("click", (e) => {
                const selectedCategory = document.getElementById("missingPersonCategoryMenu").value;
                displayMapObjects(e, ringLayer, selectedCategory);
            } 
            
        )

        }());
        console.log("Kartet er lagt til")
    </script>
{% endblock %}
